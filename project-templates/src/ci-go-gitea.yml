# Gitea Actions CI workflow for Go projects.
# Copy to .gitea/workflows/ci.yml and update the build path.
# Gitea Actions uses the same syntax as GitHub Actions with minor differences.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@{{ACTIONS_CHECKOUT_VERSION}}

      - uses: actions/setup-go@{{ACTIONS_SETUP_GO_VERSION}}
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{GOLANGCI_LINT_CLI_VERSION}}

      - name: Run golangci-lint
        run: golangci-lint run ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@{{ACTIONS_CHECKOUT_VERSION}}

      - uses: actions/setup-go@{{ACTIONS_SETUP_GO_VERSION}}
        with:
          go-version-file: go.mod

      - run: go build ./cmd/{{PROJECT_NAME}}/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@{{ACTIONS_CHECKOUT_VERSION}}

      - uses: actions/setup-go@{{ACTIONS_SETUP_GO_VERSION}}
        with:
          go-version-file: go.mod

      - run: go test -race ./...
