name: Copilot Setup Steps

on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@{{ACTIONS_CHECKOUT_VERSION}}

      - name: Set up Go
        uses: actions/setup-go@{{ACTIONS_SETUP_GO_VERSION}}
        with:
          go-version-file: go.mod

      - name: Download Go modules
        run: go mod download

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{GOLANGCI_LINT_CLI_VERSION}}

      - name: Verify build
        run: go build ./...
